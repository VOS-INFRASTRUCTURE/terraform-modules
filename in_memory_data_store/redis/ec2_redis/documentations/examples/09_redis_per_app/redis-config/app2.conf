# /etc/redis/app2.conf  — App 2 (port 6380)
#
# Deploy this file to /etc/redis/app2.conf on the Redis host.
# The deployment script (scripts/01_deploy_app2.sh) writes this automatically
# with the real password substituted. This file is the annotated reference.
#
# Managed by systemd unit:  redis-app2   (see systemd/redis-app2.service)
# Data directory:            /var/lib/redis/app2   (isolated from App 1)
# Log file:                  /var/log/redis/app2.log
# PID file:                  /var/run/redis/redis-app2.pid

# ── Network ────────────────────────────────────────────────────────────────────
# Matches App 1's bind approach — all interfaces, access controlled by the SG.
# Port 6380 is only open to app2_security_group_id (see terraform/main.tf).
bind 0.0.0.0
port 6380
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── General ────────────────────────────────────────────────────────────────────
daemonize yes
supervised systemd
pidfile /var/run/redis/redis-app2.pid
loglevel notice
logfile /var/log/redis/app2.log

# ── Memory ─────────────────────────────────────────────────────────────────────
# Same budget as App 1: 700 MB each, 1,400 MB total data + ~350 MB overhead = 1,750 MB.
maxmemory 700mb
maxmemory-policy allkeys-lru

# ── Databases ──────────────────────────────────────────────────────────────────
# Four databases is enough for all typical use cases:
#   DB 0 → default / queues
#   DB 1 → cache
#   DB 2 → sessions
#   DB 3 → spare
# Keeping this low reduces memory overhead vs the default of 16.
databases 4

# ── Persistence (RDB snapshots) ────────────────────────────────────────────────
# Isolated files — App 2's RDB never touches App 1's /var/lib/redis/dump.rdb.
save 900 1
save 300 10
save 60 10000
dbfilename dump-app2.rdb
dir /var/lib/redis/app2

# ── Persistence (AOF — write-ahead log) ───────────────────────────────────────
appendonly yes
appendfilename "appendonly-app2.aof"
appendfsync everysec

# ── Security ───────────────────────────────────────────────────────────────────
# Replaced with the real password by 01_deploy_app2.sh.
# To get the password manually: terraform output -raw app2_redis_password
requirepass <APP2_REDIS_PASSWORD>

# Disable commands that could destroy all data or expose the config.
# FLUSHALL / FLUSHDB are particularly dangerous in a multi-app scenario.
rename-command FLUSHALL  ""
rename-command FLUSHDB   ""
rename-command CONFIG    ""
rename-command DEBUG     ""
rename-command SLAVEOF   ""
rename-command REPLICAOF ""

# ── Performance ────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128
hz 20
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Connections ────────────────────────────────────────────────────────────────
# 500 clients for App 2; App 1 also allows 500 via the module default.
maxclients 500
