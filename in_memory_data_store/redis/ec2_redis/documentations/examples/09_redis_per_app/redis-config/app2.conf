# /etc/redis/app2.conf  — App 2 (port 6380)
#
# The deploy script (scripts/01_deploy_app2.sh) writes this to the host with the
# real password substituted. This file is the annotated reference copy.
#
# Managed by systemd unit:  redis-app2   (see systemd/redis-app2.service)
# Data directory:            /var/lib/redis/app2   (isolated from App 1)
# Log file:                  /var/log/redis/app2.log
# PID file:                  /var/run/redis/redis-app2.pid

# ── Network ────────────────────────────────────────────────────────────────────
# Port 6380 is only open to app2_security_group_id (terraform/main.tf).
# App 1's SG has no route to 6380 — wrong port fails at the network layer.
bind 0.0.0.0
port 6380
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── General ────────────────────────────────────────────────────────────────────
daemonize yes
supervised systemd
pidfile /var/run/redis/redis-app2.pid
loglevel notice
logfile /var/log/redis/app2.log

# ── Memory ─────────────────────────────────────────────────────────────────────
# 512 MB per app — same budget as App 1.
# r6g.medium has 8 GB, so this leaves ~6.6 GB for additional apps.
maxmemory 512mb
maxmemory-policy allkeys-lru

# ── Databases ──────────────────────────────────────────────────────────────────
# 6 databases — first 5 in active use, DB 5 reserved.
# No DB-index coordination needed between apps: every app uses the same DB numbers.
databases 6
# DB 0 → Default / fallback   — REDIS_DB=0               (Laravel Redis facade; queue/cache/session fallback)
# DB 1 → Application cache    — REDIS_CACHE_DB=1          (Cache::put / Cache::remember)
# DB 2 → User sessions        — REDIS_SESSION_DB=2        (SESSION_DRIVER=redis)
# DB 3 → Queue jobs           — REDIS_QUEUE_DB=3          (Horizon workers consume here)
# DB 4 → Horizon metrics      — REDIS_HORIZON_DB=4        (failed jobs, worker status)
# DB 5 → Scheduler locks      — REDIS_SCHEDULER_LOCK_DB=5 (onOneServer() locks)

# ── Persistence (RDB snapshots) ────────────────────────────────────────────────
# Isolated files — App 2's RDB never touches App 1's /var/lib/redis/dump.rdb.
save 900 1
save 300 10
save 60 10000
dbfilename dump-app2.rdb
dir /var/lib/redis/app2

# ── Persistence (AOF — write-ahead log) ───────────────────────────────────────
appendonly yes
appendfilename "appendonly-app2.aof"
appendfsync everysec

# ── Security ───────────────────────────────────────────────────────────────────
# Replaced with the real password by scripts/01_deploy_app2.sh.
# To retrieve: terraform output -raw app2_redis_password
requirepass <APP2_REDIS_PASSWORD>

# Disable commands that could destroy all data or reconfigure Redis live.
rename-command FLUSHALL  ""
rename-command FLUSHDB   ""
rename-command CONFIG    ""
rename-command DEBUG     ""
rename-command SLAVEOF   ""
rename-command REPLICAOF ""

# ── Performance ────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128
hz 20
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Connections ────────────────────────────────────────────────────────────────
maxclients 500
