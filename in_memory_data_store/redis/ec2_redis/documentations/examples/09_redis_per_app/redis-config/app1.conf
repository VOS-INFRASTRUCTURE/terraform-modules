# /etc/redis/redis.conf  — App 1 (port 6379)
#
# REFERENCE ONLY — this file is generated by the ec2_redis module's user_data.tf.
# It is written to the host at launch time. Do not deploy this file manually.
# Source: ec2_redis/user_data.tf
#
# Managed by systemd unit:  redis-server   (enabled by the module)
# Data directory:            /var/lib/redis
# Log file:                  /var/log/redis/redis-server.log
# PID file:                  /var/run/redis/redis-server.pid

# ── Network ────────────────────────────────────────────────────────────────────
# bind 0.0.0.0 — listens on all interfaces; access is restricted by the AWS
# Security Group (port 6379 is only open to app1_security_group_id).
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── General ────────────────────────────────────────────────────────────────────
daemonize yes
supervised systemd
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile /var/log/redis/redis-server.log

# ── Memory ─────────────────────────────────────────────────────────────────────
# Set explicitly in terraform/main.tf as "700mb".
# Do NOT rely on the module's auto calculation (1,536 MB for t4g.small) —
# that would leave no room for App 2.
maxmemory 700mb
maxmemory-policy allkeys-lru

# ── Persistence (RDB snapshots) ────────────────────────────────────────────────
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /var/lib/redis

# ── Persistence (AOF — write-ahead log) ───────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# ── Security ───────────────────────────────────────────────────────────────────
# Password is set from random_password.app1_redis via the module's redis_password variable.
requirepass <app1_redis_password>

# ── Performance ────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128
