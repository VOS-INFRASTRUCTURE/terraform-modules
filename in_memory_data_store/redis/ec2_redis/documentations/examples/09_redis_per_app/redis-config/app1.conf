# /etc/redis/redis.conf  — App 1 (port 6379)
#
# REFERENCE ONLY — generated by the ec2_redis module's user_data.tf at launch.
# Do not deploy this file manually; it is written automatically on first boot.
# Source: ec2_redis/user_data.tf
#
# Managed by systemd unit:  redis-server   (enabled by the module)
# Data directory:            /var/lib/redis
# Log file:                  /var/log/redis/redis-server.log
# PID file:                  /var/run/redis/redis-server.pid
#
# NOTE — databases:
#   The module does not write a 'databases' directive, so Redis defaults to 16.
#   To reduce it to 6 (matching App 2 and the add-app-template), connect via SSM
#   and append the line manually, then restart:
#     echo "databases 6" | sudo tee -a /etc/redis/redis.conf
#     sudo systemctl restart redis-server

# ── Network ────────────────────────────────────────────────────────────────────
# Listens on all interfaces; port 6379 is restricted to app1_security_group_id
# by the AWS Security Group (see terraform/main.tf).
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ── General ────────────────────────────────────────────────────────────────────
daemonize yes
supervised systemd
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile /var/log/redis/redis-server.log

# ── Memory ─────────────────────────────────────────────────────────────────────
# Set explicitly in terraform/main.tf as "512mb".
# Never use 'auto' on a multi-app host — r6g.medium auto would claim 6,144 MB.
maxmemory 512mb
maxmemory-policy allkeys-lru

# ── Databases ──────────────────────────────────────────────────────────────────
# Not written by the module (defaults to 16). Manually append to match App 2+:
databases 6
# DB 0 → Default / fallback   — REDIS_DB=0               (Laravel Redis facade; queue/cache/session fallback)
# DB 1 → Application cache    — REDIS_CACHE_DB=1          (Cache::put / Cache::remember)
# DB 2 → User sessions        — REDIS_SESSION_DB=2        (SESSION_DRIVER=redis)
# DB 3 → Queue jobs           — REDIS_QUEUE_DB=3          (Horizon workers consume here)
# DB 4 → Horizon metrics      — REDIS_HORIZON_DB=4        (failed jobs, worker status)
# DB 5 → Scheduler locks      — REDIS_SCHEDULER_LOCK_DB=5 (onOneServer() locks)

# ── Persistence (RDB snapshots) ────────────────────────────────────────────────
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /var/lib/redis

# ── Persistence (AOF — write-ahead log) ───────────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# ── Security ───────────────────────────────────────────────────────────────────
# Value comes from random_password.app1_redis (terraform/passwords.tf).
requirepass <app1_redis_password>

# ── Performance ────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128
