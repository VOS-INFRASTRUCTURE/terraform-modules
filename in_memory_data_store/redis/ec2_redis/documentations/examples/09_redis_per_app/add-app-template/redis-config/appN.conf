# /etc/redis/appN.conf  — App N (port 638N)
#
# Replace every occurrence of N / appN / 638N before deploying.
# The deploy script (scripts/deploy_appN.sh) does this substitution automatically.
#
# Managed by systemd unit:  redis-appN
# Data directory:            /var/lib/redis/appN
# Log file:                  /var/log/redis/appN.log
# PID file:                  /var/run/redis/redis-appN.pid

bind 0.0.0.0
port 638N
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

daemonize yes
supervised systemd
pidfile /var/run/redis/redis-appN.pid
loglevel notice
logfile /var/log/redis/appN.log

maxmemory 512mb
maxmemory-policy allkeys-lru

# DB 0  REDIS_DB=0                  Default / fallback (Laravel Redis facade)
# DB 1  REDIS_CACHE_DB=1            Application cache
# DB 2  REDIS_SESSION_DB=2          User sessions
# DB 3  REDIS_QUEUE_DB=3            Queue jobs (Horizon workers)
# DB 4  REDIS_HORIZON_DB=4          Horizon metrics, failed jobs, worker status
# DB 5  REDIS_SCHEDULER_LOCK_DB=5   onOneServer() scheduler locks
databases 6

save 900 1
save 300 10
save 60 10000
dbfilename dump-appN.rdb
dir /var/lib/redis/appN

appendonly yes
appendfilename "appendonly-appN.aof"
appendfsync everysec

requirepass <APPN_REDIS_PASSWORD>

rename-command FLUSHALL  ""
rename-command FLUSHDB   ""
rename-command CONFIG    ""
rename-command DEBUG     ""
rename-command SLAVEOF   ""
rename-command REPLICAOF ""

slowlog-log-slower-than 10000
slowlog-max-len 128
hz 20
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
maxclients 500
