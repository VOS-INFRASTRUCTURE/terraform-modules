################################################################################
# Nginx reverse proxy for Redis Insight (Docker setup)
#
# - Enforces HTTP Basic Auth before any request reaches the UI
# - Forwards WebSocket upgrade headers (required for Redis Insight's live features)
# - Proxies to the redis-insight container on the internal Docker network
################################################################################

server {
    listen 80;

    # Basic Auth gate — browser will prompt for credentials
    auth_basic           "Redis Insight";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Increase timeouts for long-running Workbench / Profiler sessions
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;

    location / {
        proxy_pass         http://redis-insight:5540;
        proxy_http_version 1.1;

        # Standard reverse proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Redis Insight's Profiler and pub/sub)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Prevent Nginx from buffering large responses (important for streaming)
        proxy_buffering off;
    }
}
