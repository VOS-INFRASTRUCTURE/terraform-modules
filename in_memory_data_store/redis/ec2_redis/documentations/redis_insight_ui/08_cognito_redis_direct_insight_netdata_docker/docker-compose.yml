################################################################################
# Redis Insight + Netdata (Docker)
#
# Redis is NOT in this compose file — it runs as a systemd service directly
# on the EC2 host. See 04_ec2_stack.md for Redis installation steps.
#
# Redis Insight connects to the host-installed Redis via host.docker.internal.
#
# Usage:
#   1. Install Redis on the host   (04_ec2_stack.md Step 3–4)
#   2. Create .env with REDIS_PASSWORD
#   3. docker compose up -d
#   4. Access via ALB  →  https://redis.prod1.company.io
#      (ALB handles Cognito auth — no auth prompt in the browser)
#
# Ports:
#   5540  — Redis Insight  (ALB target group: insight-tg)
#   19999 — Netdata        (ALB target group: netdata-tg)
################################################################################

services:

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    extra_hosts:
      # Allows the container to reach Redis on the EC2 host at localhost:6379.
      # host.docker.internal resolves to the Docker bridge gateway (host IP).
      - "host.docker.internal:host-gateway"
    environment:
      # Pre-configure the Redis connection so engineers don't need to add it manually.
      # Redis Insight reads these on first start if no database is already configured.
      RI_REDIS_HOST: host.docker.internal
      RI_REDIS_PORT: "6379"
      RI_REDIS_PASSWORD: "${REDIS_PASSWORD}"
    volumes:
      - redis-insight-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5540/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - monitoring-net

  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    restart: unless-stopped
    # pid: host allows Netdata to see all host processes (for per-process metrics).
    pid: host
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Disable Netdata Cloud sign-up nag
      NETDATA_CLAIM_TOKEN: ""
      NETDATA_CLAIM_ROOMS: ""
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge

volumes:
  redis-insight-data:
  netdata-config:
  netdata-lib:
  netdata-cache:
