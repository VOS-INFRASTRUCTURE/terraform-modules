################################################################################
# Nginx reverse proxy for Redis Insight (direct install on EC2)
#
# Deployment context:
#   - ALB terminates SSL and forwards HTTP to this EC2 on port 80
#   - Redis Insight is bound to 127.0.0.1:5540 (loopback only)
#   - This file goes in /etc/nginx/sites-available/redis-insight
#
# Key differences from the Docker config:
#   - proxy_pass uses 127.0.0.1 (not a container name)
#   - set_real_ip_from trusts the ALB's IP range for accurate client IPs
#   - real_ip_header reads the client IP that the ALB recorded
################################################################################

# Trust the ALB to provide the real client IP.
# The ALB sits in the VPC, so its source IP will be in the VPC CIDR.
# Adjust 10.0.0.0/8 to match your VPC CIDR if needed.
geo $trusted_proxy {
    default         0;
    10.0.0.0/8      1;   # VPC CIDR — ALB source IPs come from here
    172.16.0.0/12   1;   # common VPC range
    192.168.0.0/16  1;   # common VPC range
}

server {
    listen 80;

    # ALB adds X-Forwarded-For; use it to log the real client IP
    real_ip_header     X-Forwarded-For;
    set_real_ip_from   10.0.0.0/8;
    set_real_ip_from   172.16.0.0/12;
    set_real_ip_from   192.168.0.0/16;
    real_ip_recursive  on;

    # Basic Auth gate — browser will prompt for credentials
    auth_basic           "Redis Insight";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Increase timeouts for long-running Workbench / Profiler sessions
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;

    location / {
        # Redis Insight is on the same host, bound to loopback
        proxy_pass         http://127.0.0.1:5540;
        proxy_http_version 1.1;

        # Standard reverse proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Tell Redis Insight the original request was HTTPS (ALB terminates TLS)
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support (required for Redis Insight's Profiler and pub/sub)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Prevent Nginx from buffering large responses (important for streaming)
        proxy_buffering off;
    }

    # Health check endpoint for the ALB target group.
    # Returns 200 without requiring Basic Auth so the ALB can mark the instance healthy.
    location /health {
        auth_basic off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
