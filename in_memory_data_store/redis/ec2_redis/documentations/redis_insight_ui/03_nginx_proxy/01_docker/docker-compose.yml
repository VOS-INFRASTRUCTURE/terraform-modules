################################################################################
# Redis Insight + Nginx Basic Auth + Netdata (Docker)
#
# Usage:
#   1. Create .env with REDIS_APP1_PASSWORD and REDIS_APP2_PASSWORD
#   2. Generate nginx/.htpasswd  (see README.md Step 2)
#   3. docker compose up -d
#   4. Open http://<host>:8080  — Redis Insight (via Nginx)
#   5. Open http://<host>:19999 — Netdata monitoring dashboard
#
# Redis Insight is NOT exposed directly — all access goes through Nginx.
# Netdata is exposed on port 19999 and monitors host system metrics.
################################################################################

services:

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    # 'expose' makes the port available to other containers on redis-net
    # but does NOT bind it on the host — Nginx is the only public entry point.
    expose:
      - "5540"
    volumes:
      - redis-insight-data:/data
    networks:
      - redis-net

  redis-insight-proxy:
    image: nginx:1.27-alpine
    container_name: redis-insight-proxy
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/redis-insight.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - redis-insight
    networks:
      - redis-net

  netdata:
    image: netdata/netdata:latest
    container_name: netdata
    restart: unless-stopped
    pid: host
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - redis-net

networks:
  redis-net:
    driver: bridge

volumes:
  redis-insight-data:
  netdata-config:
  netdata-lib:
  netdata-cache:
