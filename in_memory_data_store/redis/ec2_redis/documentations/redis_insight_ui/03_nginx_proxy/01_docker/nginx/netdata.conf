################################################################################
# Nginx reverse proxy for Netdata (Docker setup)
#
# - Enforces HTTP Basic Auth before any request reaches the dashboard
# - Forwards WebSocket upgrade headers (required for Netdata's real-time charts)
# - Proxies to the netdata container on the internal Docker network
################################################################################

server {
    listen 19999;

    # Basic Auth gate — same credentials as Redis Insight
    auth_basic           "Netdata Monitoring";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass         http://netdata:19999;
        proxy_http_version 1.1;

        # Standard reverse proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (required for Netdata's live streaming charts)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Prevent Nginx from buffering streaming metric responses
        proxy_buffering off;
    }
}
