################################################################################
# Redis Insight + Nginx Basic Auth
#
# Usage:
#   1. Create .env with REDIS_APP1_PASSWORD and REDIS_APP2_PASSWORD
#   2. Generate nginx/.htpasswd  (see README.md Step 3)
#   3. docker compose up -d
#   4. Open http://<host>:5540
#
# Redis Insight is NOT exposed directly — all access goes through Nginx.
################################################################################

services:

  redis-app1:
    image: redis:8.0-alpine
    container_name: redis-app1
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-app1-data:/data
    command: >
      redis-server
      --requirepass "${REDIS_APP1_PASSWORD}"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    networks:
      - redis-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_APP1_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-app2:
    image: redis:8.0-alpine
    container_name: redis-app2
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-app2-data:/data
    command: >
      redis-server
      --requirepass "${REDIS_APP2_PASSWORD}"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    networks:
      - redis-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_APP2_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    # 'expose' makes the port available to other containers on redis-net
    # but does NOT bind it on the host — Nginx is the only public entry point.
    expose:
      - "5540"
    volumes:
      - redis-insight-data:/data
    depends_on:
      redis-app1:
        condition: service_healthy
      redis-app2:
        condition: service_healthy
    networks:
      - redis-net

  redis-insight-proxy:
    image: nginx:1.27-alpine
    container_name: redis-insight-proxy
    restart: unless-stopped
    ports:
      - "5540:80"
    volumes:
      - ./nginx/redis-insight.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - redis-insight
    networks:
      - redis-net

networks:
  redis-net:
    driver: bridge

volumes:
  redis-app1-data:
  redis-app2-data:
  redis-insight-data:
